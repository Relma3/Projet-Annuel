<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription Prestataire - Silver Happy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        nav { background: #1a6fa3; padding: 14px 20px; display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; }
        .contenu { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1a6fa3; }
        input { display: block; width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px; background: #1a6fa3; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Accueil</a>
    <a href="connexion.html">Connexion</a>
</nav>
<div class="contenu">
    <h1>Inscription Prestataire</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="mdp" placeholder="Mot de passe">
    <button onclick="inscrire()">S inscrire</button>
    <p id="msg"></p>
</div>
<script>
async function inscrire() {
    const res = await fetch("http://localhost/PA_2EME_ANNEE/api/index.php/register/prestataire", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: document.getElementById("email").value, mot_de_passe: document.getElementById("mdp").value })
    });
    const data = await res.json();
    document.getElementById("msg").innerText = data.message;
}
</script>
</body>
</html>
