<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Silver Happy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        nav { background: #1a6fa3; padding: 14px 20px; display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; }
        .contenu { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1a6fa3; }
        input, textarea { display: block; width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #1a6fa3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Accueil</a>

<div class="contenu">
    <h1>Contact</h1>
    <input type="text" placeholder="Votre nom">
    <input type="email" placeholder="Votre email">
    <textarea rows="5" placeholder="Votre message"></textarea>
    <button onclick="document.getElementById('msg').innerText='Message envoye !'">Envoyer</button>
    <p id="msg"></p>
</div>
